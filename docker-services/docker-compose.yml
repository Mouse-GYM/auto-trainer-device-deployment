# Services that will be run regardless of environment and will not be built locally as part of development.
services:
  api:
    image: ghcr.io/mouse-gym/auto-trainer-device-service:1.0.5
    hostname: auto-trainer-device-service
    environment:
      Autotrainer__DeviceId: "${AUTOTRAINER_DEVICE_ID}"
      Autotrainer__MessageQueue__Connection: "tcp://${AUTOTRAINER_DEVICE_ID}.mousegym.org:5556"
      Autotrainer__MessageQueue__SnS__DeviceId: "${AUTOTRAINER_DEVICE_ID}"
      Autotrainer__MessageQueue__Sns__TopicArn: "${AUTOTRAINER_SNS_TOPIC_ARN}"
      Autotrainer__MessageQueue__Sns__AccessKeyId: "${AUTOTRAINER_SNS_KEY_ID}"
      Autotrainer__MessageQueue__Sns__AccessKey: "${AUTOTRAINER_SNS_KEY}"
      Autotrainer__CommandQueue__Connection: "tcp://${AUTOTRAINER_DEVICE_ID}.mousegym.org:5557"
    volumes:
      - "${AUTOTRAINER_LOG_VOLUME}:/var/log/autotrainer"
      - "/home/autotrainer:/home/autotrainer"
      - ./certs:/certs:ro
    ports:
      - "5150:443"
    networks:
      - autotrainer
    depends_on:
      cert-manager:
        condition: service_healthy
    restart: always
  client:
    image: ghcr.io/mouse-gym/auto-trainer-device-fe:1.0.1
    hostname: auto-trainer-device-fe
    ports:
      - "8080:80"
    networks:
      - autotrainer
    volumes:
      - "${AUTOTRAINER_LOG_VOLUME}:/var/log/autotrainer"
    restart: always

  cert-manager:
    image: alpine:3.21
    entrypoint: ["/bin/sh", "/scripts/entrypoint.sh"]
    environment:
      - CERT_DOMAIN=${CERT_DOMAIN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./cert-manager:/scripts:ro
      - ./certs:/certs
      - acme-data:/acme
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/certs-ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s
    networks:
      - autotrainer
    restart: always

networks:
  autotrainer:
volumes:
  acme-data: